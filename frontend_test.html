<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار WebSocket - Mr Delivery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        .panel {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
        }

        .panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.connecting {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .messages {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            min-height: 300px;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.shop {
            background: #e3f2fd;
            border-right: 4px solid #2196f3;
        }

        .message.customer {
            background: #f3e5f5;
            border-right: 4px solid #9c27b0;
        }

        .message.system {
            background: #fff3e0;
            border-right: 4px solid #ff9800;
        }

        .message.error {
            background: #ffebee;
            border-right: 4px solid #f44336;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .message-content {
            color: #555;
            line-height: 1.6;
        }

        .message-time {
            font-size: 12px;
            color: #999;
        }

        .typing-indicator {
            color: #999;
            font-style: italic;
            padding: 10px;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-danger {
            background: #dc3545;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 اختبار WebSocket - Mr Delivery</h1>
            <p>اتصال مباشر مع الخادم</p>
        </div>

        <div class="content">
            <!-- لوحة الاتصال -->
            <div class="panel">
                <h2>⚙️ إعدادات الاتصال</h2>
                
                <div id="connectionStatus" class="status disconnected">
                    ❌ غير متصل
                </div>

                <div class="form-group">
                    <label for="serverUrl">رابط الخادم:</label>
                    <select id="serverUrl">
                        <option value="ws://localhost:8000">التطوير المحلي (ws://localhost:8000)</option>
                        <option value="wss://mrdelivery.pythonanywhere.com">PythonAnywhere (wss://mrdelivery.pythonanywhere.com)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="orderId">معرف الطلب (Order ID):</label>
                    <input type="number" id="orderId" value="1" placeholder="أدخل معرف الطلب">
                </div>

                <div class="form-group">
                    <label for="accessToken">Access Token:</label>
                    <input type="text" id="accessToken" placeholder="أدخل Access Token من تسجيل الدخول">
                </div>

                <button id="connectBtn" onclick="connect()">🔌 الاتصال</button>
                <button id="disconnectBtn" onclick="disconnect()" disabled class="btn-danger">❌ قطع الاتصال</button>
            </div>

            <!-- لوحة الرسائل -->
            <div class="panel">
                <h2>💬 الرسائل</h2>
                
                <div id="messages" class="messages">
                    <div class="message system">
                        <div class="message-header">
                            <span>النظام</span>
                        </div>
                        <div class="message-content">
                            جاهز للاتصال. أدخل البيانات واضغط على "الاتصال"
                        </div>
                    </div>
                </div>

                <div id="typingIndicator" class="typing-indicator" style="display: none;">
                    المستخدم يكتب...
                </div>

                <div class="form-group">
                    <label for="messageContent">الرسالة:</label>
                    <textarea id="messageContent" placeholder="اكتب رسالتك هنا..." rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="messageType">نوع الرسالة:</label>
                    <select id="messageType">
                        <option value="text">نص</option>
                        <option value="audio">صوت</option>
                        <option value="image">صورة</option>
                    </select>
                </div>

                <div class="actions">
                    <button onclick="sendMessage()" id="sendBtn" disabled>📤 إرسال</button>
                    <button onclick="markAsRead()" id="readBtn" disabled class="btn-secondary">✓ تعليم كمقروء</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let isConnected = false;

        // عناصر DOM
        const connectionStatus = document.getElementById('connectionStatus');
        const messagesDiv = document.getElementById('messages');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const sendBtn = document.getElementById('sendBtn');
        const readBtn = document.getElementById('readBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        function updateStatus(status, message) {
            connectionStatus.className = `status ${status}`;
            connectionStatus.textContent = message;
        }

        function addMessage(type, sender, content, time = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const timeStr = time || new Date().toLocaleTimeString('ar-SA');
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <span>${sender}</span>
                    <span class="message-time">${timeStr}</span>
                </div>
                <div class="message-content">${content}</div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function connect() {
            const serverUrl = document.getElementById('serverUrl').value;
            const orderId = document.getElementById('orderId').value;
            const token = document.getElementById('accessToken').value;

            if (!orderId || !token) {
                alert('الرجاء إدخال معرف الطلب و Access Token');
                return;
            }

            // بناء URL
            const wsUrl = `${serverUrl}/ws/chat/order/${orderId}/?token=${token}`;
            
            updateStatus('connecting', '🔄 جاري الاتصال...');
            connectBtn.disabled = true;

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = function(event) {
                    isConnected = true;
                    updateStatus('connected', '✅ متصل بنجاح');
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    sendBtn.disabled = false;
                    readBtn.disabled = false;
                    addMessage('system', 'النظام', 'تم الاتصال بنجاح! يمكنك الآن إرسال الرسائل.');
                };

                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        handleMessage(data);
                    } catch (e) {
                        console.error('خطأ في تحليل الرسالة:', e);
                        addMessage('error', 'خطأ', 'فشل تحليل الرسالة: ' + event.data);
                    }
                };

                ws.onerror = function(error) {
                    console.error('خطأ في WebSocket:', error);
                    addMessage('error', 'خطأ', 'حدث خطأ في الاتصال');
                    updateStatus('disconnected', '❌ خطأ في الاتصال');
                };

                ws.onclose = function(event) {
                    isConnected = false;
                    updateStatus('disconnected', '❌ تم قطع الاتصال');
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                    sendBtn.disabled = true;
                    readBtn.disabled = true;
                    
                    if (event.code !== 1000) {
                        addMessage('system', 'النظام', `تم إغلاق الاتصال. الكود: ${event.code}, السبب: ${event.reason || 'غير معروف'}`);
                    }
                };

            } catch (error) {
                console.error('خطأ في إنشاء الاتصال:', error);
                updateStatus('disconnected', '❌ فشل الاتصال');
                connectBtn.disabled = false;
                addMessage('error', 'خطأ', 'فشل إنشاء الاتصال: ' + error.message);
            }
        }

        function handleMessage(data) {
            switch(data.type) {
                case 'connection':
                    addMessage('system', 'النظام', data.message);
                    break;
                
                case 'chat_message':
                    if (data.data) {
                        const sender = data.data.sender_type === 'shop' ? 'المحل' : 'العميل';
                        const type = data.data.sender_type;
                        let content = data.data.content;
                        
                        if (data.data.image_file_url) {
                            content += `<br><img src="${data.data.image_file_url}" style="max-width: 200px; margin-top: 10px; border-radius: 5px;">`;
                        }
                        
                        if (data.data.audio_file_url) {
                            content += `<br><audio controls style="margin-top: 10px;"><source src="${data.data.audio_file_url}"></audio>`;
                        }
                        
                        addMessage(type, sender, content, new Date(data.data.created_at).toLocaleTimeString('ar-SA'));
                    }
                    break;
                
                case 'messages_read':
                    addMessage('system', 'النظام', `تم تعليم رسائل الطلب #${data.order_id} كمقروءة`);
                    break;
                
                case 'typing':
                    if (data.is_typing) {
                        typingIndicator.style.display = 'block';
                        typingIndicator.textContent = `${data.user_type === 'shop' ? 'المحل' : 'العميل'} يكتب...`;
                    } else {
                        typingIndicator.style.display = 'none';
                    }
                    break;
                
                case 'error':
                    addMessage('error', 'خطأ', data.message);
                    break;
                
                default:
                    console.log('رسالة غير معروفة:', data);
            }
        }

        function sendMessage() {
            if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) {
                alert('غير متصل بالخادم');
                return;
            }

            const content = document.getElementById('messageContent').value.trim();
            const messageType = document.getElementById('messageType').value;

            if (!content && messageType === 'text') {
                alert('الرجاء إدخال محتوى الرسالة');
                return;
            }

            const message = {
                type: 'chat_message',
                content: content,
                message_type: messageType
            };

            ws.send(JSON.stringify(message));
            
            // إضافة الرسالة محلياً
            addMessage('shop', 'أنت', content);
            
            // مسح الحقل
            document.getElementById('messageContent').value = '';
        }

        function markAsRead() {
            if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) {
                alert('غير متصل بالخادم');
                return;
            }

            ws.send(JSON.stringify({
                type: 'mark_read'
            }));

            addMessage('system', 'النظام', 'تم إرسال طلب تعليم الرسائل كمقروءة');
        }

        function disconnect() {
            if (ws) {
                ws.close(1000, 'تم الإغلاق من قبل المستخدم');
                ws = null;
            }
        }

        // إرسال عند الضغط على Enter
        document.getElementById('messageContent').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // إرسال مؤشر الكتابة
        let typingTimeout;
        document.getElementById('messageContent').addEventListener('input', function() {
            if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            // إرسال مؤشر الكتابة
            ws.send(JSON.stringify({
                type: 'typing',
                is_typing: true
            }));

            // إيقاف مؤشر الكتابة بعد 3 ثوان
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'typing',
                        is_typing: false
                    }));
                }
            }, 3000);
        });
    </script>
</body>
</html>
