upstream django {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name 86.48.3.103;

    client_max_body_size 100M;

    # Static files
    location /static/ {
        alias /home/Mr_Delivery/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /home/Mr_Delivery/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Public downloadable app packages (Windows installer, etc.)
    location /downloads/ {
        alias /home/Mr_Delivery/downloads/;
        default_type application/octet-stream;
        expires 7d;
        add_header Cache-Control "public";
        add_header Content-Disposition "attachment";
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_connect_timeout 86400;
    }

    # Django application
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cross-Origin-Opener-Policy;
        proxy_hide_header Cross-Origin-Embedder-Policy;
        proxy_hide_header Cross-Origin-Resource-Policy;
        proxy_hide_header Origin-Agent-Cluster;
        proxy_hide_header Permissions-Policy;
        proxy_redirect off;
    }
}
